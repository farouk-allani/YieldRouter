[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

[profile.default.fuzz]
runs = 256

[profile.ci]
fuzz = { runs = 1024 }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
